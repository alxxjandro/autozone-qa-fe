name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente a deployar'
        required: true
        type: choice
        options:
          - dev
          - uat
      version:
        description: 'Version tag a deployar (ej: 1.0.0 o latest)'
        required: true
        default: 'latest'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          IMAGE_BASE=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/autozone-qa-repo/autozone-qa-fe
          ENVIRONMENT=${{ github.event.inputs.environment }}
          VERSION=${{ github.event.inputs.version }}

          gcloud run deploy autozone-qa-fe-$ENVIRONMENT \
            --image $IMAGE_BASE:$ENVIRONMENT-$VERSION \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2

      - name: Show service URL
        run: |
          gcloud run services describe autozone-qa-fe-${{ github.event.inputs.environment }} \
            --region=us-central1 \
            --format="value(status.url)"
